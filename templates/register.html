<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet" href="/static/style.css">

</head>



<body>



<div class="auth-container">



<div class="auth-card">



<div class="github-logo">

<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png">

</div>



<h1>Create Account</h1>


<p>
Register for GitHub Analyzer
</p>




<form method="POST">



<div class="input-box">

<span>👤</span>

<input
name="username"
placeholder="Username"
required>


</div>




<div class="input-box">


<span>🔒</span>


<input

type="password"

name="password"

placeholder="Password"

required>


</div>





<button class="auth-btn">

Register

</button>



</form>





<p class="bottom-text">


Already have account?

<a href="/login">

Login

</a>


</p>



</div>



</div>



</body>


</html>
