<!DOCTYPE html>

<html>


<head>


<title>
Register - GitHub Analyzer
</title>


<link rel="stylesheet"
href="/static/style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>




<body class="auth-bg">





<div class="auth-card">



<div class="logo">

<i class="fab fa-github"></i>

</div>



<h1>

Create Account

</h1>



<p>

Start analyzing profiles

</p>





<form method="POST">



<div class="input-box">

<i class="fa fa-user"></i>


<input

name="username"

placeholder="Username"

required>


</div>





<div class="input-box">


<i class="fa fa-key"></i>


<input

type="password"

name="password"

placeholder="Password"

required>


</div>






<button class="auth-btn">

Register

</button>




</form>




<p class="bottom">

Already have account?

<a href="/login">

Login

</a>


</p>




</div>





</body>

</html>
