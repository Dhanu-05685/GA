<!DOCTYPE html>

<html>

<head>

<title>Login - GitHub Analyzer</title>


<link rel="stylesheet"
href="/static/style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>



<body class="auth-bg">



<div class="auth-card">



<div class="logo">

<i class="fab fa-github"></i>

</div>




<h1>
Welcome Back
</h1>


<p>
Login to GitHub Analyzer
</p>




<form method="POST">



<div class="input-box">

<i class="fa fa-user"></i>

<input

name="username"

placeholder="Username"

required>

</div>





<div class="input-box">


<i class="fa fa-lock"></i>


<input

type="password"

name="password"

placeholder="Password"

required>


</div>




<button class="auth-btn">

Login

</button>




</form>




<p class="bottom">

Don't have an account?

<a href="/register">

Register

</a>


</p>




</div>



</body>

</html>
